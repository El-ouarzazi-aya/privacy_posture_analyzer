version: "3.9"

services:
  backend:
    build: .
    container_name: privacy-posture-analyzer
    ports:
      - "8000:8000"
    # Load API keys (GROQ_API_KEY, GEMINI_API_KEY) from the .env file
    env_file:
      - ./backend/.env
    volumes:
      # Persist the SQLite database across container restarts
      - ./backend/privacy_analyzer.db:/app/backend/privacy_analyzer.db
      # Persist uploaded APK files
      - ./backend/uploads:/app/backend/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
